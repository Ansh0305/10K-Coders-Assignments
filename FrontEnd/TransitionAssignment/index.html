<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="card">
      <img src="https://5.imimg.com/data5/SELLER/Default/2024/5/421883673/LC/EK/VJ/50167530/64f0bba619253f21ac6e7b38-fresh-red-delicious-apple-each.jpg" alt="">
      <div class="overlay">
        <h1>Apple</h1>
      </div>
    </div>

    <div class="card">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSMZw3NVvQB7ew-0I7zWlJw5b6iaU9TrcGY4Q&s" alt="">
      <div class="overlay">
        <h1>Banana</h1>
      </div>
    </div>

    <div class="card">
      <img src="https://cdn.britannica.com/70/234870-050-D4D024BB/Orange-colored-cat-yawns-displaying-teeth.jpg" alt="">
      <div class="overlay">
        <h1>Cat</h1>
      </div>
    </div>

    <div class="card">
      <img src="https://cdn.outsideonline.com/wp-content/uploads/2023/03/Funny_Dog_H.jpg?auto=webp&width=3840&quality=75&fit=cover" alt="">
      <div class="overlay">
        <h1>Dog</h1>
      </div>
    </div>

    <div class="card">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRF4j0iESo6almHOoIQUGKdxYWuCKg4jnORlg&s" alt="">
      <div class="overlay">
        <h1>Elephant</h1>
      </div>
    </div>

  </div>

</body>
</html>
